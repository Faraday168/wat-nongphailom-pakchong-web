<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>แกลเลอรีภาพ</title><link rel="stylesheet" href="assets/css/v3.css"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet"></head><body><header class="nav"><div class="brand">วัดหนองไผ่ล้อม ปากช่อง</div><nav class="menu"><a href="index.html">หน้าหลัก</a><a href="activities.html">กิจกรรม</a><a href="donation.html">บอกบุญ</a><a href="finance.html">รายงานการเงิน</a><a href="dhamma.html">คลังธรรมะ</a><a href="live.html">ถ่ายทอดสด</a><a href="contact.html">ติดต่อ</a></nav><a class="btn" href="admin/index.html">ผู้ดูแล</a></header><section class="hero"><div class="wrap"><h1>แกลเลอรีภาพ</h1><p>ภาพกิจกรรมและงานบุญของวัด</p></div></section><main class="wrap"><div id="dynamicList" class="grid"></div></main><footer class="footer"><div class="wrap">© วัดหนองไผ่ล้อม ปากช่อง</div></footer><script type="module">import { firebaseConfig } from './assets/js/firebase-config.js';import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';import { getFirestore,collection,getDocs,query,orderBy } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';try{const app=initializeApp(firebaseConfig);const db=getFirestore(app);const snap=await getDocs(query(collection(db,'gallery'),orderBy('createdAt','desc')));document.getElementById('dynamicList').innerHTML=snap.docs.map(d=>{let x=d.data();return `<div class="card"><h3>${x.title||''}</h3><p>${x.description||x.url||''}</p>${x.url?`<p><a class="btn" href="${x.url}" target="_blank">เปิดดู</a></p>`:''}</div>`}).join('')||'<div class="card">ยังไม่มีข้อมูล</div>';}catch(e){document.getElementById('dynamicList').innerHTML='<div class="card">ยังไม่ได้ตั้งค่า Firebase</div>';}</script></body></html>
